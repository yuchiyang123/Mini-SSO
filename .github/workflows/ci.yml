name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore Mini-SSO.sln

      - name: Build
        run: dotnet build Mini-SSO.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Mini-SSO.sln --configuration Release --no-build --verbosity normal
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Mini-SSO/Dockerfile -t mini-sso:ci .
