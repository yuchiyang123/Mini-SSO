worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream mini_sso_api {
        server api:8080;
    }

    # 基本的第二層 rate limit，跟應用層的 IP 登入鎖定形成縱深防禦。
    limit_req_zone $binary_remote_addr zone=mini_sso_general:10m rate=20r/s;

    server {
        listen 80;
        server_name _;

        location / {
            limit_req zone=mini_sso_general burst=40 nodelay;

            proxy_pass http://mini_sso_api;
            proxy_http_version 1.1;

            # 讓後端拿到真正的來源 IP / 協定，對應 Program.cs 的 UseForwardedHeaders。
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

