worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 用 Docker 內建的 DNS（127.0.0.11）搭配下面 proxy_pass 用變數的寫法，讓 nginx
    # 每次請求都重新解析 api 這個服務名稱的 IP，而不是啟動時解析一次就快取住。
    # 沒有這段的話，只要 api 容器被 recreate（換了新 IP，開發時常發生），nginx 還
    # 是會一直打舊 IP，變成 502 Bad Gateway，直到手動重啟 nginx 為止。
    resolver 127.0.0.11 valid=10s;

    # 基本的第二層 rate limit，跟應用層的 IP 登入鎖定形成縱深防禦。
    limit_req_zone $binary_remote_addr zone=mini_sso_general:10m rate=20r/s;

    # Cloudflare Tunnel／上一層 nginx 會把真正的協定放在 X-Forwarded-Proto 轉進來，
    # 但這裡跟它們的連線本身是走 plain HTTP，$scheme 永遠是 http。要用上一層轉的值，
    # 沒有的時候（直接本機存取）才退回這個連線自己的 $scheme。
    map $http_x_forwarded_proto $effective_scheme {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;
        server_name _;

        location / {
            limit_req zone=mini_sso_general burst=40 nodelay;

            set $api_upstream http://api:8080;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;

            # 讓後端拿到真正的來源 IP / 協定，對應 Program.cs 的 UseForwardedHeaders。
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ---- 之後要上 HTTPS，可以參考下面這段（需要自己準備憑證檔案） ----
